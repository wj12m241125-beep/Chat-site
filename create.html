<!DOCTYPE html>
<html>
<head>
<title>방 만들기</title>
</head>

<body>

<h1>새 채팅방 만들기</h1>

<input id="roomName" placeholder="방 이름 입력">
<input id="roomTitle" placeholder="방 제목"><br>
<input id="roomDesc" placeholder="방 설명"><br>
<button onclick="createRoom()">방 만들기</button>
<br><br>

<button onclick="createRoom()">방 생성</button>

<script>

function createRoom(){

var name = document.getElementById("roomName").value;

if(name === ""){
alert("방 이름을 입력하세요");
return;
}

var rooms = JSON.parse(localStorage.getItem("rooms")) || [];

var room = {
name: name,
admin: "me"
};

rooms.push(room);

localStorage.setItem("rooms", JSON.stringify(rooms));

window.location.href = "rooms.html";

}

function createRoom(){

var title = document.getElementById("roomTitle").value;
var desc = document.getElementById("roomDesc").value;

var user = localStorage.getItem("loginUser");

var rooms = JSON.parse(localStorage.getItem("rooms")) || [];

rooms.push({
title:title,
desc:desc,
owner:user
});

localStorage.setItem("rooms",JSON.stringify(rooms));

alert("방 생성 완료");

window.location.href="rooms.html";

}

</body>
</html>
