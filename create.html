<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>방 만들기</title>
</head>

<body>

<h1>새 채팅방 만들기</h1>

<input id="roomTitle" placeholder="방 제목"><br>
<input id="roomMax" placeholder="최대 인원"><br>

<button onclick="createRoom()">방 생성</button>

<script>

function createRoom(){

let title = document.getElementById("roomTitle").value;
let max = document.getElementById("roomMax").value;

let nickname = localStorage.getItem("nickname");
let age = localStorage.getItem("age");

if(!nickname){
alert("로그인 후 이용해주세요");
location.href="login.html";
return;
}

if(!title){
alert("방 제목 입력");
return;
}

if(!max || isNaN(max)){
alert("최대 인원 숫자로 입력");
return;
}

max = parseInt(max);

let rooms = JSON.parse(localStorage.getItem("rooms") || "[]");

if(rooms.some(r=>r.title===title)){
alert("이미 존재하는 방");
return;
}

rooms.push({
title: title,
users: 1,
max: max,
owner: nickname,
age: age,
category: "전체"
});

// 🔥 핵심
localStorage.setItem("currentUser", nickname);
localStorage.setItem("currentRoom", title);

localStorage.setItem("rooms", JSON.stringify(rooms));

alert("방 생성 완료");

location.href="chat.html";
}

</script>

</body>
</html>
