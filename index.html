<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>메인</title>

<style>

body{
font-family:sans-serif;
}

.top{
position:absolute;
top:10px;
left:10px;
}

button{
margin-right:10px;
}

</style>

</head>

<body>

<div class="top">

<button onclick="profile()">개인정보 설정</button>

<button onclick="logout()">로그아웃</button>

</div>

<h1>채팅 사이트</h1>

<p id="welcome"></p>

<p><a href="rooms.html">채팅방 목록</a></p>

<script>

var user=localStorage.getItem("loginUser");

if(!user){
window.location.href="login.html";
}

document.getElementById("welcome").innerText=user+"님 환영합니다";

function logout(){

localStorage.removeItem("loginUser");

window.location.href="login.html";

}

function profile(){

alert("개인정보 설정은 다음 단계에서 만들겠습니다");

}

</script>

</body>
</html>
