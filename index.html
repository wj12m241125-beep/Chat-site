<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beep Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* 상단바 */

.topbar{
background:#111;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

/* 사이트 이름 */

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:1px;
}

/* 버튼 */

.topbtn{
padding:8px 14px;
margin-left:10px;
border:none;
background:#333;
color:white;
cursor:pointer;
}

/* 레이아웃 */

.container{
display:flex;
}

/* 왼쪽 카테고리 */

.sidebar{
width:200px;
background:white;
height:100vh;
border-right:1px solid #ddd;
padding:20px;
}

.ageBtn{
display:block;
width:100%;
padding:12px;
margin-bottom:10px;
background:#eee;
border:none;
font-size:16px;
cursor:pointer;
}

.ageBtn:hover{
background:#ddd;
}

/* 방 목록 */

.rooms{
flex:1;
padding:20px;
}

/* 방 카드 */

.room{
background:white;
padding:18px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
}

.room h3{
margin:0;
font-size:18px;
}

.room p{
margin:5px 0;
color:#555;
}

.enterBtn{
margin-top:10px;
padding:7px 12px;
background:#111;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
Beep Chat
</div>

<div>

<button class="topbtn" onclick="profile()">개인정보</button>

<button class="topbtn" onclick="logout()">로그아웃</button>

</div>

</div>

<div class="container">

<div class="sidebar">

<button class="ageBtn">10대</button>
<button class="ageBtn">20대</button>
<button class="ageBtn">30대</button>
<button class="ageBtn">40대</button>
<button class="ageBtn">50대</button>

</div>

<div class="rooms">

<div id="roomList"></div>

</div>

</div>

<script>

var user=localStorage.getItem("loginUser");

if(!user){
window.location.href="login.html";
}

var rooms=JSON.parse(localStorage.getItem("rooms"))||[];

var list=document.getElementById("roomList");

rooms.forEach(function(room,index){

list.innerHTML+=`
<div class="room">
<h3>${room.title}</h3>
<p>${room.desc}</p>
<p>방장 : ${room.owner}</p>
<button class="enterBtn" onclick="enterRoom(${index})">입장</button>
</div>
`;

});

function enterRoom(i){

localStorage.setItem("currentRoom",i);

window.location.href="chat.html";

}

function logout(){

localStorage.removeItem("loginUser");

window.location.href="login.html";

}

function profile(){

window.location.href="profile.html";

}

</script>

</body>
</html>
