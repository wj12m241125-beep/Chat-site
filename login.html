<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>
</head>

<body>

<h2>로그인</h2>

<input id="nickname" placeholder="별명"><br><br>
<input id="pw" type="password" placeholder="비밀번호"><br><br>

<button onclick="login()">로그인</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAplZ2_XOS18w2zGvkzpvWIIAv2LJAM3A",
  authDomain: "chat-site-86ccf.firebaseapp.com",
  projectId: "chat-site-86ccf",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function(){

let nickname = document.getElementById("nickname").value;
let pw = document.getElementById("pw").value;

const q = query(collection(db,"users"),
where("nickname","==",nickname),
where("pw","==",pw));

const snapshot = await getDocs(q);

if(snapshot.empty){
alert("정보 틀림");
return;
}

localStorage.setItem("loginUser",nickname);

alert("로그인 성공");
location.href="chat.html";

}

</script>

</body>
</html>
