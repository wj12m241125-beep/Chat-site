<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>
</head>

<body>

<h2>로그인</h2>

<input id="nickname" placeholder="별명"><br><br>
<input id="pw" type="password" placeholder="비밀번호"><br><br>

<button onclick="login()">로그인</button>

<p><a href="signup.html">회원가입</a></p>

<script>

function login(){

var nickname=document.getElementById("nickname").value;
var pw=document.getElementById("pw").value;

var users=JSON.parse(localStorage.getItem("users"))||[];

var ok=false;

users.forEach(function(user){

if(user.nickname===nickname && user.pw===pw){
ok=true;
}

});

if(ok){

localStorage.setItem("loginUser",nickname);

alert("로그인 성공");

window.location.href="index.html";

}else{

alert("정보가 틀렸습니다");

}

}

</script>

</body>
</html>
