<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>
</head>

<body>

<h2>로그인</h2>

<input id="nickname" placeholder="별명"><br><br>
<input id="pw" type="password" placeholder="비밀번호"><br><br>

<button onclick="login()">로그인</button>

<p><a href="signup.html">회원가입</a></p>

<script>

function login(){

var nickname = document.getElementById("nickname").value;
var pw = document.getElementById("pw").value;

var users = JSON.parse(localStorage.getItem("users")) || [];
var banned = JSON.parse(localStorage.getItem("bannedUsers") || "[]");

var foundUser = null;

// 🔍 유저 찾기
users.forEach(function(user){
if(user.nickname === nickname && user.pw === pw){
foundUser = user;
}
});

// ❌ 로그인 실패
if(!foundUser){
alert("정보가 틀렸습니다");
return;
}

// 🚫 차단 체크 (🔥 핵심 추가)
if(banned.includes(nickname)){
alert("차단된 사용자입니다");
return;
}

// ✅ 로그인 성공
localStorage.setItem("loginUser", nickname);
localStorage.setItem("currentUser", nickname);

// 👉 관리자에서 쓸 정보 저장 (나이/성별)
localStorage.setItem("age", foundUser.age || "");
localStorage.setItem("gender", foundUser.gender || "");

// 👉 접속 유저 목록 기록 (관리자용)
var onlineUsers = JSON.parse(localStorage.getItem("onlineUsers") || "[]");

if(!onlineUsers.includes(nickname)){
onlineUsers.push(nickname);
localStorage.setItem("onlineUsers", JSON.stringify(onlineUsers));
}

alert("로그인 성공");

window.location.href = "index.html";

}

</script>

</body>
</html>
