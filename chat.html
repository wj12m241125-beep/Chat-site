<!DOCTYPE html>
<html>
<head>
<title>채팅방</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

#chat{
margin:20px auto;
width:300px;
background:white;
padding:20px;
height:300px;
overflow:auto;
border-radius:10px;
}

input{
padding:10px;
width:200px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h1 id="roomTitle"></h1>

<div id="chat"></div>

<input id="msg" placeholder="메시지 입력">
<button onclick="send()">보내기</button>

<script>

var room = localStorage.getItem("currentRoom");

document.getElementById("roomTitle").innerText = room;

function send(){

var msg = document.getElementById("msg").value;

var chat = document.getElementById("chat");

chat.innerHTML += "<p>"+msg+"</p>";

document.getElementById("msg").value="";

}

</script>

</body>
</html>
