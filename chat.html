<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>beep chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f0f0f0;
}

#container{
display:flex;
height:100vh;
}

#users{
width:220px;
background:white;
border-right:1px solid #ddd;
padding:10px;
overflow-y:auto;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
padding:10px;
overflow-y:auto;
}

.message{
margin-bottom:8px;
}

#inputBox{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

#messageInput{
flex:1;
padding:10px;
font-size:16px;
}

#sendBtn{
padding:10px 15px;
margin-left:5px;
}

#imageBtn{
padding:10px;
margin-left:5px;
}

.user{
cursor:pointer;
margin-bottom:5px;
}

#profile{
display:none;
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div id="container">

<div id="users">
<h3>접속자</h3>
<ul id="userList"></ul>
</div>

<div id="chatArea">

<div id="messages"></div>

<div id="inputBox">
<input id="messageInput" placeholder="메시지 입력">
<button id="sendBtn">보내기</button>
<button id="imageBtn">사진</button>
<input type="file" id="imageUpload" style="display:none">
</div>

</div>

</div>

<div id="profile">
<p id="pName"></p>
<p id="pAge"></p>
<p id="pGender"></p>
<button onclick="closeProfile()">닫기</button>
</div>

<script>

const currentUser = JSON.parse(localStorage.getItem("currentUser"));
const room = JSON.parse(localStorage.getItem("currentRoom"));

let users = JSON.parse(localStorage.getItem("roomUsers")) || [];
let messages = JSON.parse(localStorage.getItem("roomMessages")) || [];

if(!users.includes(currentUser.nickname)){
users.push(currentUser.nickname);
localStorage.setItem("roomUsers",JSON.stringify(users));
}

const owner = room.owner;

function renderUsers(){

const list=document.getElementById("userList");
list.innerHTML="";

users.forEach(u=>{

const li=document.createElement("li");

let text=u;

if(u===owner){
text+=" 👑";
}

li.innerText=text;
li.className="user";

li.onclick=function(){
showProfile(u);
};

list.appendChild(li);

});

}

function renderMessages(){

const box=document.getElementById("messages");
box.innerHTML="";

messages.forEach(m=>{

const div=document.createElement("div");
div.className="message";
div.innerHTML=m;

box.appendChild(div);

});

box.scrollTop=box.scrollHeight;

}

function addMessage(msg){

messages.push(msg);

localStorage.setItem("roomMessages",JSON.stringify(messages));

renderMessages();

}

function sendMessage(){

const input=document.getElementById("messageInput");
const msg=input.value;

if(msg==="") return;

if(checkCommand(msg)){
input.value="";
return;
}

addMessage("<b>"+currentUser.nickname+"</b> : "+msg);

input.value="";

}

document.getElementById("sendBtn").onclick=sendMessage;

document.getElementById("messageInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

function checkCommand(msg){

if(!msg.startsWith("/")) return false;

const args=msg.split(" ");
const cmd=args[0];

if(cmd==="/공지"){

const text=args.slice(1).join(" ");
addMessage("<b>[공지]</b> "+text);
return true;

}

if(cmd==="/강퇴"){

if(currentUser.nickname!==owner){
alert("방장만 사용 가능");
return true;
}

const target=args[1];

users=users.filter(u=>u!==target);

localStorage.setItem("roomUsers",JSON.stringify(users));

addMessage(target+" 강퇴됨");

renderUsers();

return true;

}

if(cmd==="/방삭제"){

if(currentUser.nickname!==owner){
alert("방장만 가능");
return true;
}

localStorage.removeItem("roomMessages");
localStorage.removeItem("roomUsers");

location.href="rooms.html";

return true;

}

return false;

}

function showProfile(name){

const allUsers = JSON.parse(localStorage.getItem("users")) || [];

const user = allUsers.find(u=>u.nickname===name);

document.getElementById("pName").innerText="닉네임 : "+user.nickname;
document.getElementById("pAge").innerText="나이 : "+user.age;
document.getElementById("pGender").innerText="성별 : "+user.gender;

document.getElementById("profile").style.display="block";

}

function closeProfile(){

document.getElementById("profile").style.display="none";

}

/* 사진 업로드 */

document.getElementById("imageBtn").onclick=function(){

document.getElementById("imageUpload").click();

}

document.getElementById("imageUpload").addEventListener("change",function(){

const file=this.files[0];

const reader=new FileReader();

reader.onload=function(e){

addMessage("<b>"+currentUser.nickname+"</b><br><img src='"+e.target.result+"' style='max-width:200px'>");

}

reader.readAsDataURL(file);

});

renderUsers();
renderMessages();

</script>

</body>
</html>
