<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>beep chat</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
}

#container{
display:flex;
height:100vh;
}

#users{
width:220px;
background:white;
border-right:1px solid #ddd;
padding:15px;
overflow-y:auto;
}

#users h3{
margin-top:0;
}

#userList{
list-style:none;
padding:0;
}

#userList li{
padding:6px 0;
border-bottom:1px solid #eee;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin-bottom:10px;
font-size:16px;
}

#inputArea{
display:flex;
padding:12px;
background:white;
border-top:1px solid #ddd;
}

#msg{
flex:1;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

#send{
margin-left:10px;
padding:12px 20px;
font-size:16px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#send:hover{
background:#45a049;
}

#imageUpload{
margin-left:10px;
}
</style>

</head>

<body>

<div id="container">

<div id="users">
<h3>접속자</h3>
<ul id="userList"></ul>
</div>

<div id="chatArea">

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="메시지 입력">
<button id="send">보내기</button>
<input type="file" id="imageUpload">
</div>

</div>

</div>

<script>

let nickname = localStorage.getItem("nickname") || "익명"
let roomName = localStorage.getItem("currentRoom") || "default"

let rooms = JSON.parse(localStorage.getItem("rooms") || "{}")

if(!rooms[roomName]){
rooms[roomName] = { users:0 }
}

rooms[roomName].users++

localStorage.setItem("rooms", JSON.stringify(rooms))

let roomOwner = localStorage.getItem("roomOwner") || nickname
let users = [nickname]

function renderUsers(){

let list = document.getElementById("userList")
list.innerHTML=""

users.forEach(u=>{

let li=document.createElement("li")

if(u===roomOwner){
li.innerHTML="👑 "+u
}else{
li.innerText=u
}

list.appendChild(li)

})

}

function addMessage(text){

let div=document.createElement("div")
div.className="message"
div.innerHTML=text

let messages=document.getElementById("messages")

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

function handleCommand(msg){

if(!msg.startsWith("/")) return false

let args=msg.split(" ")
let cmd=args[0]

if(cmd==="/주사위"){

let r=Math.floor(Math.random()*6)+1
addMessage("<b>🎲 주사위 결과 : "+r+"</b>")
return true

}

if(cmd==="/강퇴"){

if(nickname!==roomOwner){
addMessage("방장만 사용 가능합니다")
return true
}

let target=args[1]

users=users.filter(u=>u!==target)

addMessage("<b>"+target+" 강퇴됨</b>")

renderUsers()

return true

}

return false

}

document.getElementById("send").onclick=function(){

let input=document.getElementById("msg")
let msg=input.value

if(msg==="") return

if(handleCommand(msg)){
input.value=""
return
}

addMessage("<b>"+nickname+"</b> : "+msg)

input.value=""

}

document.getElementById("imageUpload").onchange=function(){

let file=this.files[0]

if(!file) return

let reader=new FileReader()

reader.onload=function(e){

addMessage("<b>"+nickname+"</b><br><img src='"+e.target.result+"' width='200'>")

}

reader.readAsDataURL(file)

}

window.addEventListener("beforeunload", function(){

let rooms = JSON.parse(localStorage.getItem("rooms") || "{}")

if(rooms[roomName]){

rooms[roomName].users--

if(rooms[roomName].users <= 0){
delete rooms[roomName]
}

localStorage.setItem("rooms", JSON.stringify(rooms))

}

})

renderUsers()

</script>

</body>
</html>
