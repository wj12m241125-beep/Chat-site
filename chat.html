<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beep Chat</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
flex-direction:column;
background:#f5f5f5;
}

.top{
background:#111;
color:white;
padding:15px;
font-size:20px;
}

.container{
flex:1;
display:flex;
}

.users{
width:200px;
background:white;
border-right:1px solid #ddd;
padding:10px;
}

.user{
padding:6px;
border-bottom:1px solid #eee;
}

.chatArea{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
margin-bottom:10px;
}

.inputArea{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

.inputBox{
flex:1;
padding:10px;
font-size:16px;
border:1px solid #ccc;
}

.sendBtn{
width:90px;
background:#111;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="top" id="roomTitle"></div>

<div class="container">

<div class="users">

<h3>접속자</h3>
<div id="userList"></div>

</div>

<div class="chatArea">

<div class="messages" id="messages"></div>

<div class="inputArea">

<input id="msg" class="inputBox" placeholder="메시지 입력">

<button class="sendBtn" onclick="send()">보내기</button>

</div>

</div>

</div>

<script>

var user=localStorage.getItem("loginUser");

if(!user){
window.location.href="login.html";
}

var roomIndex=localStorage.getItem("currentRoom");

var rooms=JSON.parse(localStorage.getItem("rooms"))||[];

var room=rooms[roomIndex];

/* 구조 생성 */

if(!room.users){
room.users=[];
}

if(!room.messages){
room.messages=[];
}

/* 방 제목 */

document.getElementById("roomTitle").innerText=room.title;

/* 접속자 추가 */

if(!room.users.includes(user)){
room.users.push(user);
}

/* 저장 */

rooms[roomIndex]=room;

localStorage.setItem("rooms",JSON.stringify(rooms));

/* 접속자 목록 */

var userList=document.getElementById("userList");

room.users.forEach(function(u){

var crown="";

if(u===room.owner){
crown=" 👑";
}

userList.innerHTML+=`
<div class="user">${u}${crown}</div>
`;

});

/* 메시지 출력 */

var msgBox=document.getElementById("messages");

room.messages.forEach(function(m){

msgBox.innerHTML+=`
<div class="msg"><b>${m.user}</b> : ${m.text}</div>
`;

});

/* 메시지 보내기 */

function send(){

var text=document.getElementById("msg").value;

if(text==""){
return;
}

room.messages.push({
user:user,
text:text
});

rooms[roomIndex]=room;

localStorage.setItem("rooms",JSON.stringify(rooms));

location.reload();

}

/* 방 나가기 */

window.onbeforeunload=function(){

var rooms=JSON.parse(localStorage.getItem("rooms"))||[];

var room=rooms[roomIndex];

room.users=room.users.filter(function(u){
return u!==user;
});

if(room.users.length===0){
rooms.splice(roomIndex,1);
}else{
rooms[roomIndex]=room;
}

localStorage.setItem("rooms",JSON.stringify(rooms));

};

</script>

</body>
</html>
