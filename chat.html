<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채팅방</title>
<style>
body{margin:0; display:flex; font-family:sans-serif;}
#users{width:200px; background:#f4f4f4; padding:10px;}
#chat{flex:1; display:flex; flex-direction:column;}
#messages{flex:1; overflow-y:auto; padding:10px;}
#inputBox{display:flex;}
#inputBox input{flex:1; padding:10px;}
#inputBox button{padding:10px;}
.system{color:orange;}
#exitBtn{position:absolute; top:10px; right:10px;}
</style>
</head>

<body>

<button id="exitBtn">나가기</button>

<div id="users">
<h3>접속자</h3>
<ul id="userList"></ul>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputBox">
<input type="text" id="msgInput">
<button id="sendBtn">전송</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
deleteDoc,
doc,
getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBAplZ2_XOS18w2zGvkzpvWIIAv2LJAM3A",
authDomain: "chat-site-86ccf.firebaseapp.com",
projectId: "chat-site-86ccf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("currentUser");
const currentRoom = localStorage.getItem("currentRoom");

if(!currentUser || !currentRoom){
alert("잘못된 접근");
location.href="rooms.html";
}

// 🔥 내 유저 문서 id 저장용
let myDocId = null;

// =======================
// 👥 접속자 추가
// =======================
async function joinRoom(){
const docRef = await addDoc(collection(db,"roomUsers_"+currentRoom),{
user: currentUser,
time: Date.now()
});
myDocId = docRef.id;
}
await joinRoom();

// =======================
// 👥 접속자 실시간 표시
// =======================
const userQuery = query(collection(db,"roomUsers_"+currentRoom));

onSnapshot(userQuery,(snapshot)=>{

const list = document.getElementById("userList");
list.innerHTML="";

let count = 0;

snapshot.forEach(doc=>{
const data = doc.data();
count++;

const li = document.createElement("li");
li.textContent = data.user;
list.appendChild(li);
});

// 🔥 방 인원 업데이트
updateRoomCount(count);

// 🔥 인원 0명 → 방 삭제
if(count === 0){
deleteRoom();
}

});

// =======================
// 🔥 방 인원 업데이트
// =======================
async function updateRoomCount(count){
const rooms = await getDocs(collection(db,"rooms"));

rooms.forEach(async r=>{
if(r.data().title === currentRoom){
await deleteDoc(doc(db,"rooms",r.id));
await addDoc(collection(db,"rooms"),{
...r.data(),
users: count
});
}
});
}

// =======================
// 🔥 방 삭제
// =======================
async function deleteRoom(){
const rooms = await getDocs(collection(db,"rooms"));

rooms.forEach(async r=>{
if(r.data().title === currentRoom){
await deleteDoc(doc(db,"rooms",r.id));
}
});
}

// =======================
// 💬 실시간 채팅
// =======================
const msgQuery = query(
collection(db,"messages_"+currentRoom),
orderBy("time")
);

onSnapshot(msgQuery,(snapshot)=>{

const box = document.getElementById("messages");
box.innerHTML="";

snapshot.forEach(doc=>{
const m = doc.data();
const div = document.createElement("div");

if(m.system){
div.innerHTML = `<span class="system">${m.text}</span>`;
}else{
div.textContent = `${m.user}: ${m.text}`;
}

box.appendChild(div);
});

box.scrollTop = box.scrollHeight;

});

// =======================
// 💬 메시지 전송
// =======================
window.sendMessage = async function(){

let input = document.getElementById("msgInput");
let text = input.value.trim();
if(!text) return;

await addDoc(collection(db,"messages_"+currentRoom),{
user: currentUser,
text: text,
time: Date.now()
});

input.value="";
};

document.getElementById("sendBtn").onclick = sendMessage;
document.getElementById("msgInput").addEventListener("keypress", e=>{
if(e.key==="Enter") sendMessage();
});

// =======================
// 🚪 나가기
// =======================
document.getElementById("exitBtn").onclick = async function(){

// 🔥 내 유저 삭제
if(myDocId){
await deleteDoc(doc(db,"roomUsers_"+currentRoom, myDocId));
}

location.href="rooms.html";
};

// 🔥 창 닫아도 자동 나가기
window.addEventListener("beforeunload", async ()=>{
if(myDocId){
await deleteDoc(doc(db,"roomUsers_"+currentRoom, myDocId));
}
});

</script>

</body>
</html>
