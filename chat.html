<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채팅방</title>
<style>
body{margin:0; display:flex; font-family:sans-serif;}
#users{width:200px; background:#f4f4f4; padding:10px;}
#chat{flex:1; display:flex; flex-direction:column;}
#messages{flex:1; overflow-y:auto; padding:10px;}
#inputBox{display:flex;}
#inputBox input{flex:1; padding:10px;}
#inputBox button{padding:10px;}
.owner{color:red; font-weight:bold;}
.system{color:orange;}
</style>
</head>
<body>

<div id="users">
<h3>접속자</h3>
<ul id="userList"></ul>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputBox">
<input type="text" id="msgInput" placeholder="메시지 입력">
<button id="sendBtn">전송</button>
</div>
</div>

<script>

const currentUser = localStorage.getItem("currentUser");
const currentRoom = localStorage.getItem("currentRoom");

if(!currentUser || !currentRoom){
alert("잘못된 접근");
location.href = "rooms.html";
}

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let messages = JSON.parse(localStorage.getItem("messages_"+currentRoom)) || [];
let users = JSON.parse(localStorage.getItem("roomUsers_"+currentRoom)) || [];

const room = rooms.find(r => r.title === currentRoom);

// 유저 추가
if(!users.includes(currentUser)){
users.push(currentUser);
localStorage.setItem("roomUsers_"+currentRoom, JSON.stringify(users));
}

// 유저 목록
function renderUsers(){
const list = document.getElementById("userList");
list.innerHTML = "";

users.forEach(u=>{
const li = document.createElement("li");

if(room && room.owner === u){
li.innerHTML = `<span class="owner">👑 ${u}</span>`;
} else {
li.textContent = u;
}

list.appendChild(li);
});
}

// 메시지
function renderMessages(){
const box = document.getElementById("messages");
box.innerHTML = "";

messages.forEach(m=>{
const div = document.createElement("div");

if(m.system){
div.innerHTML = `<span class="system">${m.text}</span>`;
}else{
div.textContent = `${m.user}: ${m.text}`;
}

box.appendChild(div);
});

box.scrollTop = box.scrollHeight;
}

// ✅ 시스템 메시지
function addSystemMessage(text){
messages.push({
system:true,
text:text
});
localStorage.setItem("messages_"+currentRoom, JSON.stringify(messages));
renderMessages();
}

// 🔥 명령어 처리
function handleCommand(text){

let args = text.split(" ");

switch(args[0]){

case "/신고":
let target = args[1];
let reason = args.slice(2).join(" ");

if(!target){
addSystemMessage("사용법: /신고 닉네임 이유");
return;
}

// 신고 저장
let reports = JSON.parse(localStorage.getItem("reports") || "[]");

reports.push({
target:target,
reason:reason || "사유 없음",
reporter:currentUser,
room:currentRoom,
time:new Date().toLocaleString()
});

localStorage.setItem("reports", JSON.stringify(reports));

addSystemMessage(`🚨 ${target} 신고 완료`);
break;

case "/공지":
if(room.owner !== currentUser){
addSystemMessage("❌ 방장만 가능");
return;
}
addSystemMessage("📢 " + args.slice(1).join(" "));
break;

case "/강퇴":
if(room.owner !== currentUser){
addSystemMessage("❌ 방장만 가능");
return;
}

let kickTarget = args[1];

users = users.filter(u=>u !== kickTarget);
localStorage.setItem("roomUsers_"+currentRoom, JSON.stringify(users));

addSystemMessage(`🚫 ${kickTarget} 강퇴됨`);
renderUsers();
break;

default:
addSystemMessage("❓ 없는 명령어");
}

}

// 전송
function sendMessage(){
const input = document.getElementById("msgInput");
const text = input.value.trim();
if(!text) return;

// 🔥 명령어 실행
if(text.startsWith("/")){
handleCommand(text);
input.value="";
return;
}

messages.push({
user: currentUser,
text: text
});

localStorage.setItem("messages_"+currentRoom, JSON.stringify(messages));

input.value = "";
renderMessages();
}

// 이벤트
document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("msgInput").addEventListener("keypress", e=>{
if(e.key === "Enter") sendMessage();
});

// 실행
renderUsers();
renderMessages();

</script>

</body>
</html>
