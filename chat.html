<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채팅방</title>

<style>
body{margin:0; display:flex; font-family:sans-serif;}
#users{width:200px; background:#f4f4f4; padding:10px;}
#chat{flex:1; display:flex; flex-direction:column;}
#messages{flex:1; overflow-y:auto; padding:10px;}
#inputBox{display:flex;}
#inputBox input{flex:1; padding:10px;}
#inputBox button{padding:10px;}
.system{color:orange;}
#exitBtn{position:absolute; top:10px; right:10px;}
#noticeBox{background:#ffeaa7; padding:5px;}
</style>
</head>

<body>

<button id="exitBtn">나가기</button>

<div id="users">
<h3>접속자</h3>
<ul id="userList"></ul>
</div>

<div id="chat">

<div id="noticeBox"></div>

<div id="messages"></div>

<div id="inputBox">
<input type="text" id="msgInput">
<button id="sendBtn">전송</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
deleteDoc,
doc,
getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBAplZ2_XOS18w2zGvkzpvWIIAv2LJAM3A",
authDomain: "chat-site-86ccf.firebaseapp.com",
projectId: "chat-site-86ccf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("currentUser");
const currentRoom = localStorage.getItem("currentRoom");

if(!currentUser || !currentRoom){
alert("잘못된 접근");
location.href="rooms.html";
}

let myDocId = null;

// =====================
// 👥 입장
// =====================
async function joinRoom(){
const ref = await addDoc(collection(db,"roomUsers_"+currentRoom),{
user: currentUser,
time: Date.now()
});
myDocId = ref.id;
}
await joinRoom();

// =====================
// 👥 접속자 표시
// =====================
onSnapshot(collection(db,"roomUsers_"+currentRoom), snapshot=>{

const list = document.getElementById("userList");
list.innerHTML="";

let count = 0;

snapshot.forEach(d=>{
count++;
let li=document.createElement("li");
li.textContent=d.data().user;
list.appendChild(li);
});

updateRoomCount(count);

if(count===0) deleteRoom();

});

// =====================
// 🔥 방 인원 업데이트
// =====================
async function updateRoomCount(count){
const rooms = await getDocs(collection(db,"rooms"));

rooms.forEach(async r=>{
if(r.data().title===currentRoom){
await deleteDoc(doc(db,"rooms",r.id));
await addDoc(collection(db,"rooms"),{
...r.data(),
users:count
});
}
});
}

// =====================
// 🧹 방 삭제
// =====================
async function deleteRoom(){
const rooms = await getDocs(collection(db,"rooms"));

rooms.forEach(async r=>{
if(r.data().title===currentRoom){
await deleteDoc(doc(db,"rooms",r.id));
}
});
}

// =====================
// 💬 채팅
// =====================
onSnapshot(query(
collection(db,"messages_"+currentRoom),
orderBy("time")
), snapshot=>{

const box=document.getElementById("messages");
box.innerHTML="";

snapshot.forEach(doc=>{
let m=doc.data();
let div=document.createElement("div");

if(m.system){
div.innerHTML=`<span class="system">${m.text}</span>`;
}else{
div.textContent=`${m.user}: ${m.text}`;
}

box.appendChild(div);
});

box.scrollTop=box.scrollHeight;

});

// 전송
window.sendMessage = async function(){
let input=document.getElementById("msgInput");
let text=input.value.trim();
if(!text) return;

await addDoc(collection(db,"messages_"+currentRoom),{
user:currentUser,
text:text,
time:Date.now()
});

input.value="";
};

document.getElementById("sendBtn").onclick=sendMessage;
document.getElementById("msgInput").addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

// =====================
// 🚪 나가기
// =====================
async function leave(){
if(myDocId){
await deleteDoc(doc(db,"roomUsers_"+currentRoom,myDocId));
}
location.href="rooms.html";
}

document.getElementById("exitBtn").onclick=leave;

window.addEventListener("beforeunload",()=>{
if(myDocId){
deleteDoc(doc(db,"roomUsers_"+currentRoom,myDocId));
}
});

// =====================
// 🚫 강퇴 감지
// =====================
onSnapshot(collection(db,"kicks"), snapshot=>{
snapshot.forEach(d=>{
let data=d.data();

if(data.target===currentUser){
alert("강퇴됨");
leave();
}
});
});

// =====================
// 📢 공지
// =====================
onSnapshot(collection(db,"notices"), snapshot=>{
let box=document.getElementById("noticeBox");
box.innerHTML="";

snapshot.forEach(d=>{
let div=document.createElement("div");
div.textContent="📢 "+d.data().text;
box.appendChild(div);
});
});

</script>
</body>
</html>
