<!DOCTYPE html>
<html>
<head>
<title>채팅방</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

#chat{
margin:20px auto;
width:300px;
background:white;
padding:20px;
height:300px;
overflow:auto;
border-radius:10px;
}

input{
padding:10px;
width:200px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h1 id="roomTitle"></h1>

<div id="chat"></div>

<input id="msg" placeholder="메시지 입력">
<button onclick="send()">보내기</button>

<script>

var room = localStorage.getItem("currentRoom");
var name = localStorage.getItem("nickname");

document.getElementById("roomTitle").innerText = room;

var users = JSON.parse(localStorage.getItem("users")) || [];

var now = Date.now();

users.push({
name:name,
time:now
});

localStorage.setItem("users", JSON.stringify(users));

</script>

<script>

var user = localStorage.getItem("loginUser");

if(!user){
window.location.href = "login.html";
}

</script>

</body>
</html>
