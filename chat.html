<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채팅방</title>
<style>
body{margin:0; display:flex; font-family:sans-serif;}
#users{width:200px; background:#f4f4f4; padding:10px;}
#chat{flex:1; display:flex; flex-direction:column;}
#messages{flex:1; overflow-y:auto; padding:10px;}
#inputBox{display:flex;}
#inputBox input{flex:1; padding:10px;}
#inputBox button{padding:10px;}
.owner{color:red; font-weight:bold;}
.system{color:orange;}
#exitBtn{position:absolute; top:10px; right:10px;}
</style>
</head>
<body>

<button id="exitBtn">나가기</button>

<div id="users">
<h3>접속자</h3>
<ul id="userList"></ul>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputBox">
<input type="text" id="msgInput" placeholder="메시지 입력">
<button id="sendBtn">전송</button>
</div>
</div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAplZ2_XOS18w2zGvkzpvWIIAv2LJAM3A",
  authDomain: "chat-site-86ccf.firebaseapp.com",
  projectId: "chat-site-86ccf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 기존 값
const currentUser = localStorage.getItem("currentUser");
const currentRoom = localStorage.getItem("currentRoom");

if(!currentUser || !currentRoom){
alert("잘못된 접근");
location.href = "rooms.html";
}

// 🔥 유저 목록 (로컬 유지)
let users = JSON.parse(localStorage.getItem("roomUsers_"+currentRoom)) || [];
if(!users.includes(currentUser)){
users.push(currentUser);
localStorage.setItem("roomUsers_"+currentRoom, JSON.stringify(users));
}

// 유저 렌더
function renderUsers(){
const list = document.getElementById("userList");
list.innerHTML = "";

users.forEach(u=>{
const li = document.createElement("li");
li.textContent = u;
list.appendChild(li);
});
}

// 🔥 실시간 메시지 (핵심)
const q = query(collection(db, "messages_"+currentRoom), orderBy("time"));

onSnapshot(q,(snapshot)=>{

const box = document.getElementById("messages");
box.innerHTML = "";

snapshot.forEach(doc=>{
const m = doc.data();
const div = document.createElement("div");

if(m.system){
div.innerHTML = `<span class="system">${m.text}</span>`;
}else{
div.textContent = `${m.user}: ${m.text}`;
}

box.appendChild(div);
});

box.scrollTop = box.scrollHeight;

});

// 시스템 메시지
async function addSystemMessage(text){
await addDoc(collection(db,"messages_"+currentRoom),{
system:true,
text:text,
time:Date.now()
});
}

// 명령어
async function handleCommand(text){

let args = text.split(" ");

switch(args[0]){

case "/신고":
addSystemMessage(`🚨 ${args[1]} 신고됨`);
break;

case "/공지":
addSystemMessage("📢 " + args.slice(1).join(" "));
break;

case "/강퇴":
let kickTarget = args[1];
users = users.filter(u=>u !== kickTarget);
localStorage.setItem("roomUsers_"+currentRoom, JSON.stringify(users));
renderUsers();
addSystemMessage(`🚫 ${kickTarget} 강퇴됨`);
break;

default:
addSystemMessage("❓ 없는 명령어");
}

}

// 메시지 전송
window.sendMessage = async function(){

const input = document.getElementById("msgInput");
const text = input.value.trim();
if(!text) return;

if(text.startsWith("/")){
handleCommand(text);
input.value="";
return;
}

await addDoc(collection(db,"messages_"+currentRoom),{
user: currentUser,
text: text,
time: Date.now()
});

input.value="";
};

// 이벤트
document.getElementById("sendBtn").onclick = sendMessage;
document.getElementById("msgInput").addEventListener("keypress", e=>{
if(e.key === "Enter") sendMessage();
});

// 🔥 나가기 버튼
document.getElementById("exitBtn").onclick = function(){

users = users.filter(u => u !== currentUser);
localStorage.setItem("roomUsers_"+currentRoom, JSON.stringify(users));

// 방 비었으면 삭제
if(users.length === 0){
localStorage.removeItem("roomUsers_"+currentRoom);
}

location.href = "rooms.html";

};

// 실행
renderUsers();

</script>

</body>
</html>
