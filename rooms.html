<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>beep chat</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

#top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
padding:10px 15px;
font-size:16px;
}

.room{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

.room:hover{
background:#eee;
}

</style>

</head>

<body>

<div id="top">
<h2>beep chat</h2>
<button onclick="createRoom()">방 만들기</button>
</div>

<div id="rooms"></div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms") || "[]")

function save(){
localStorage.setItem("rooms", JSON.stringify(rooms))
}

function render(){

let box = document.getElementById("rooms")
box.innerHTML=""

rooms.forEach((r,i)=>{

let div=document.createElement("div")
div.className="room"

div.innerHTML=
"<b>"+r.title+"</b><br>"+
r.users+" / "+r.max+" 명<br>"+
"방장 : "+r.owner+" ("+r.age+")"

div.onclick=function(){

localStorage.setItem("currentRoom", r.title)

rooms[i].users++
save()

location.href="chat.html"

}

box.appendChild(div)

})

}

function createRoom(){

let title = prompt("방 제목")
if(!title) return

let max = prompt("최대 인원")
if(!max) return

let nickname = localStorage.getItem("nickname") || "익명"
let age = localStorage.getItem("age") || "?"

rooms.push({
title:title,
users:1,
max:max,
owner:nickname,
age:age
})

save()

render()

}

render()

</script>

</body>
</html>
