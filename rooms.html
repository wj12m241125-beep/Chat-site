<!DOCTYPE html>
<html>
<head>
<title>비프챗 채팅방</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

header{
background:#222;
color:white;
padding:20px;
}

.room{
background:white;
width:300px;
margin:15px auto;
padding:20px;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h1>비프챗 채팅방</h1>
</header>

<div id="roomList"></div>

<button onclick="location.href='create.html'">
방 만들기
</button>

<script>

var rooms = JSON.parse(localStorage.getItem("rooms")) || [];
var list = document.getElementById("roomList");

rooms.forEach(function(room, index){

var div = document.createElement("div");
div.className = "room";

var title = document.createElement("p");
title.innerText = room.name;

title.onclick = function(){

localStorage.setItem("currentRoom", room.name);
window.location.href = "chat.html";

};

div.appendChild(title);

if(room.admin === "me"){

var del = document.createElement("button");
del.innerText = "방 삭제";

del.onclick = function(){

rooms.splice(index,1);
localStorage.setItem("rooms", JSON.stringify(rooms));
location.reload();

};

div.appendChild(del);

}

list.appendChild(div);

});

</script>
  
</body>
</html>
