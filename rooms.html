<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>채팅방 목록</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f2f2f2;
}

/* 상단바 */

.topbar{
background:#222;
color:white;
padding:15px;
font-size:22px;
}

/* 전체 레이아웃 */

.container{
display:flex;
}

/* 왼쪽 메뉴 */

.sidebar{
width:200px;
background:white;
height:100vh;
border-right:1px solid #ddd;
padding:20px;
}

.ageBtn{
display:block;
width:100%;
padding:12px;
margin-bottom:10px;
background:#eee;
border:none;
font-size:16px;
cursor:pointer;
}

.ageBtn:hover{
background:#ddd;
}

/* 방 목록 */

.rooms{
flex:1;
padding:20px;
}

/* 방 카드 */

.room{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
}

.room h3{
margin:0;
font-size:20px;
}

.room p{
margin:5px 0;
color:#555;
}

.enterBtn{
margin-top:10px;
padding:8px 14px;
background:#333;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">
채팅 사이트
</div>

<div class="container">

<div class="sidebar">

<button class="ageBtn">10대</button>
<button class="ageBtn">20대</button>
<button class="ageBtn">30대</button>
<button class="ageBtn">40대</button>
<button class="ageBtn">50대</button>

</div>

<div class="rooms">

<div id="roomList"></div>

</div>

</div>

<script>

var rooms=JSON.parse(localStorage.getItem("rooms"))||[];

var list=document.getElementById("roomList");

rooms.forEach(function(room,index){

list.innerHTML+=`
<div class="room">
<h3>${room.title}</h3>
<p>${room.desc}</p>
<p>방장 : ${room.owner}</p>
<button class="enterBtn" onclick="enterRoom(${index})">입장</button>
</div>
`;

});

function enterRoom(i){

localStorage.setItem("currentRoom",i);

window.location.href="chat.html";

}

</script>

</body>
</html>
