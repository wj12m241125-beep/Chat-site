<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>beep chat</title>

<style>
body{font-family:Arial; background:#f2f2f2; margin:0; padding:20px;}
#top{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
#categories{margin-bottom:15px;}
.cat{margin-right:8px; padding:6px 12px; border:none; background:#ddd; cursor:pointer; border-radius:5px;}
.cat.active{background:#4CAF50; color:white;}
.room{background:white; padding:15px; margin-bottom:10px; border-radius:8px; cursor:pointer;}
.room:hover{background:#eee;}
</style>
</head>

<body>

<div id="top">
<h2>beep chat</h2>
<button onclick="createRoom()">방 만들기</button>
</div>

<div id="categories">
<button class="cat active" onclick="setCategory('전체', event)">전체</button>
<button class="cat" onclick="setCategory('10대', event)">10대</button>
<button class="cat" onclick="setCategory('20대', event)">20대</button>
<button class="cat" onclick="setCategory('30대', event)">30대</button>
<button class="cat" onclick="setCategory('40대', event)">40대</button>
<button class="cat" onclick="setCategory('50대', event)">50대</button>
</div>

<div id="rooms"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAplZ2_XOS18w2zGvkzpvWIIAv2LJAM3A",
  authDomain: "chat-site-86ccf.firebaseapp.com",
  projectId: "chat-site-86ccf",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 현재 유저
let nickname = localStorage.getItem("loginUser");
let age = localStorage.getItem("age");

let currentCategory="전체"

// 나이 카테고리
function getAgeCategory(){
if(!age) return "기타"
let n = parseInt(age)
if(n<20) return "10대"
if(n<30) return "20대"
if(n<40) return "30대"
if(n<50) return "40대"
return "50대"
}

// 카테고리 선택
window.setCategory = function(c,e){
currentCategory=c
document.querySelectorAll(".cat").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")
renderRooms(lastSnapshot)
}

// 🔥 실시간 방 목록
let lastSnapshot = [];

const q = query(collection(db,"rooms"));

onSnapshot(q,(snapshot)=>{
lastSnapshot = snapshot.docs.map(doc=>({
id:doc.id,
...doc.data()
}));
renderRooms(lastSnapshot);
});

// 렌더
function renderRooms(rooms){

let box=document.getElementById("rooms")
box.innerHTML=""

rooms.forEach(r=>{

if(currentCategory!=="전체" && r.category!==currentCategory) return

let div=document.createElement("div")
div.className="room"

div.innerHTML=
`<b>${r.title}</b><br>
${r.users || 0} / ${r.max} 명<br>
방장 : ${r.owner}`

// 입장
div.onclick=async function(){

if((r.users||0) >= r.max){
alert("방이 가득 찼습니다")
return
}

localStorage.setItem("currentUser", nickname)
localStorage.setItem("currentRoom", r.title)

// 🔥 인원 증가
await addDoc(collection(db,"roomUsers_"+r.title),{
user:nickname,
time:Date.now()
});

location.href="chat.html"
}

box.appendChild(div)

})

}

// 방 생성
window.createRoom = async function(){

if(!nickname){
alert("로그인 후 이용해주세요")
location.href="login.html"
return
}

let title=prompt("방 제목")
if(!title) return

let max=prompt("최대 인원")
if(!max || isNaN(max)){
alert("숫자 입력")
return
}

let category=getAgeCategory()

await addDoc(collection(db,"rooms"),{
title:title,
users:1,
max:parseInt(max),
owner:nickname,
category:category,
createdAt:Date.now()
})

localStorage.setItem("currentUser", nickname)
localStorage.setItem("currentRoom", title)

location.href="chat.html"

}

</script>
</body>
</html>
