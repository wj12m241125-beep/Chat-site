<!DOCTYPE html>
<html>
<head>
<title>비프챗 채팅방</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

header{
background:#222;
color:white;
padding:20px;
}

.room{
background:white;
width:300px;
margin:15px auto;
padding:20px;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:20px;
}

</style>
.room{
border:1px solid #ccc;
padding:15px;
margin:10px;
border-radius:10px;
background:#f5f5f5;
}

</head>

<body>

<header>
<h1>비프챗 채팅방</h1>
</header>

<div id="roomList"></div>

<button onclick="location.href='create.html'">
방 만들기
</button>

<script>

var rooms = JSON.parse(localStorage.getItem("rooms")) || [];

var list = document.getElementById("roomList");

list.innerHTML = "";

rooms.forEach(function(room,index){

list.innerHTML += `
<div class="room">
<h3>${room.title}</h3>
<p>${room.desc}</p>
<p>방장: ${room.owner}</p>
<button onclick="enterRoom(${index})">입장</button>
</div>
`;

});

</script>

  <script>

var user = localStorage.getItem("loginUser");

if(!user){
window.location.href = "login.html";
}

</script>
  
</body>
</html>
