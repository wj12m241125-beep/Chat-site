<!DOCTYPE html>
<html>
<head>
<title>비프챗 회원가입</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h1>비프챗 회원가입</h1>

<input id="id" placeholder="아이디"><br>
<input id="pw" type="password" placeholder="비밀번호"><br>
<button onclick="signup()">가입하기</button>

<button>가입하기</button>

<p>
이미 계정이 있나요?  
<a href="login.html">로그인</a>
</p>

  <script>

function signup(){

var id = document.getElementById("id").value;
var pw = document.getElementById("pw").value;

if(id=="" || pw==""){
alert("아이디와 비밀번호 입력");
return;
}

var users = JSON.parse(localStorage.getItem("users")) || [];

users.push({
id:id,
pw:pw
});

localStorage.setItem("users",JSON.stringify(users));

alert("회원가입 완료");

window.location.href="login.html";

}

</script>

</body>
</html>
