<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>회원가입</title>
</head>

<body>

<h2>회원가입</h2>

<input id="nickname" placeholder="별명"><br><br>
<input id="pw" type="password" placeholder="비밀번호"><br><br>

<button onclick="signup()">회원가입</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAplZ2_XOS18w2zGvkzpvWIIAv2LJAM3A",
  authDomain: "chat-site-86ccf.firebaseapp.com",
  projectId: "chat-site-86ccf",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.signup = async function(){

let nickname = document.getElementById("nickname").value;
let pw = document.getElementById("pw").value;

if(!nickname || !pw){
alert("입력하세요");
return;
}

// 🔥 중복 검사
const q = query(collection(db,"users"), where("nickname","==",nickname));
const snapshot = await getDocs(q);

if(!snapshot.empty){
alert("이미 존재하는 별명");
return;
}

// 🔥 저장
await addDoc(collection(db,"users"),{
nickname,
pw,
createdAt: Date.now()
});

alert("회원가입 완료");
location.href="login.html";

}

</script>

</body>
</html>
