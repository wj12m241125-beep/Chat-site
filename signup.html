<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>회원가입</title>
</head>

<body>

<h2>회원가입</h2>

<input id="nickname" placeholder="별명"><br><br>
<input id="age" placeholder="나이"><br><br>

<select id="gender">
<option value="">성별 선택</option>
<option value="남">남</option>
<option value="여">여</option>
</select><br><br>

<input id="pw" type="password" placeholder="비밀번호"><br><br>

<button onclick="signup()">가입하기</button>

<script>

function signup(){

// 기기당 1계정 제한
if(localStorage.getItem("myAccount")){
alert("이 기기에서는 이미 계정을 만들었습니다");
return;
}

var nickname=document.getElementById("nickname").value;
var age=document.getElementById("age").value;
var gender=document.getElementById("gender").value;
var pw=document.getElementById("pw").value;

if(nickname==""||age==""||gender==""||pw==""){
alert("모든 정보를 입력하세요");
return;
}

var users=JSON.parse(localStorage.getItem("users"))||[];

// 닉네임 중복 검사
var duplicate=false;

users.forEach(function(user){
if(user.nickname===nickname){
duplicate=true;
}
});

if(duplicate){
alert("이미 존재하는 별명입니다");
return;
}

users.push({
nickname:nickname,
age:age,
gender:gender,
pw:pw
});

localStorage.setItem("users",JSON.stringify(users));

// 이 기기에서 계정 생성 기록
localStorage.setItem("myAccount","true");

alert("회원가입 완료");

window.location.href="login.html";

}

</script>

</body>
</html>
