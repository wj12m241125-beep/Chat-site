<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자</title>

<style>
#adminBtn{position:fixed;bottom:10px;left:10px;background:#222;color:#fff;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;}
.adminBox{display:none;position:fixed;bottom:60px;left:10px;background:#fff;border:1px solid #ccc;padding:15px;width:320px;max-height:80%;overflow:auto;}
</style>
</head>

<body>

<div id="adminBtn">⚙</div>

<div id="adminLogin" class="adminBox">
<input type="password" id="adminPass">
<button onclick="login()">접속</button>
</div>

<div id="adminPanel" class="adminBox">

<h3>👤 유저</h3>
<ul id="userList"></ul>

<h3>🏠 방</h3>
<ul id="roomList"></ul>

<h3>📢 공지</h3>
<input id="noticeInput">
<button onclick="addNotice()">등록</button>
<ul id="noticeList"></ul>

<button onclick="closePanel()">닫기</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
deleteDoc,
doc,
addDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBAplZ2_XOS18w2zGvkzpvWIIAv2LJAM3A",
authDomain: "chat-site-86ccf.firebaseapp.com",
projectId: "chat-site-86ccf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD="beepadmin";

document.getElementById("adminBtn").onclick=()=>{
document.getElementById("adminLogin").style.display="block";
};

window.login=function(){
if(document.getElementById("adminPass").value===ADMIN_PASSWORD){
document.getElementById("adminLogin").style.display="none";
document.getElementById("adminPanel").style.display="block";
load();
}else alert("비번 틀림");
};

window.closePanel=()=>{
document.getElementById("adminPanel").style.display="none";
};

// =====================
// 🔥 데이터
// =====================
function load(){

// 유저
onSnapshot(collection(db,"users"), snap=>{
let list=document.getElementById("userList");
list.innerHTML="";

snap.forEach(d=>{
let u=d.data();

let li=document.createElement("li");
li.textContent=u.nickname;

let del=document.createElement("button");
del.textContent="삭제";
del.onclick=()=>deleteUser(d.id);

let ban=document.createElement("button");
ban.textContent="차단";
ban.onclick=()=>banUser(u.nickname);

let kick=document.createElement("button");
kick.textContent="강퇴";
kick.onclick=()=>kickUser(u.nickname);

li.append(del,ban,kick);
list.appendChild(li);
});
});

// 방
onSnapshot(collection(db,"rooms"), snap=>{
let list=document.getElementById("roomList");
list.innerHTML="";

snap.forEach(d=>{
let r=d.data();

let li=document.createElement("li");
li.textContent=`${r.title} (${r.users})`;

let del=document.createElement("button");
del.textContent="삭제";
del.onclick=()=>deleteRoom(d.id);

li.appendChild(del);
list.appendChild(li);
});
});

// 공지
onSnapshot(collection(db,"notices"), snap=>{
let list=document.getElementById("noticeList");
list.innerHTML="";

snap.forEach(d=>{
let li=document.createElement("li");
li.textContent=d.data().text;
list.appendChild(li);
});
});

}

// =====================
// 🔥 기능
// =====================
async function deleteUser(id){
await deleteDoc(doc(db,"users",id));
}

async function deleteRoom(id){
await deleteDoc(doc(db,"rooms",id));
}

async function banUser(name){
await addDoc(collection(db,"bannedUsers"),{
name:name,
time:Date.now()
});
alert("차단됨");
}

async function kickUser(name){
await addDoc(collection(db,"kicks"),{
target:name,
time:Date.now()
});
alert("강퇴됨");
}

window.addNotice=async function(){
let input=document.getElementById("noticeInput");
if(!input.value.trim()) return;

await addDoc(collection(db,"notices"),{
text:input.value,
time:Date.now()
});

input.value="";
};

</script>
</body>
</html>
